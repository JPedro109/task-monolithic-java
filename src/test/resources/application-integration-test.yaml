spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    secret: integration-test-secret-key-must-be-at-least-32-chars
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000

management:
  metrics:
    export:
      otlp:
        enabled: false
