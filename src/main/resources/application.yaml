spring:
  application:
    name: task

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:task}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: when-authorized

  metrics:
    export:
      otlp:
        enabled: ${ENABLE_OTLP_COLLECTOR:false}
        url: ${OTLP_COLLECTOR_URL}
        step: ${OTLP_COLLECTOR_PUSH_INTERVAL:1s}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      distribution:
        slo:
          http.server.requests: 50ms,100ms,200ms,500ms,1s,2s,5s

  tracing:
    sampling:
      probability: 1.0
    baggage:
      remote-fields:
        - correlation-id
        - user-id
      correlation:
        fields:
          - correlation-id
          - user-id

logging:
  level:
    com.jpmns.task: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
